<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="SoftSutra offers direct app downloads with a clean home page focused on apps, features, and platform buttons.">
  <meta name="keywords" content="SoftSutra, app download, Windows app, Android app, PDF reader, Vaidic Mala Jap">
  <meta name="author" content="Raman Sharma (Aazad)">
  <meta name="theme-color" content="#F9FAFB">
  <meta name="color-scheme" content="light">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'self' https://github.com https://release-assets.githubusercontent.com; manifest-src 'self'; media-src 'self'; worker-src 'none'; upgrade-insecure-requests; block-all-mixed-content">
  <link rel="canonical" href="https://softsutra.online/">
  <meta property="og:title" content="SoftSutra">
  <meta property="og:description" content="Weaving ideas into Seamless Apps with direct platform download buttons.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://softsutra.online/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="home-page">
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div class="page-ambient" aria-hidden="true">
    <div class="page-ambient__beam page-ambient__beam--blue"></div>
    <div class="page-ambient__beam page-ambient__beam--orange"></div>
    <div class="page-ambient__mesh"></div>
  </div>

  <main class="landing" id="main-content">
    <div class="shell">
      <section class="lockup" data-reveal>
        <h1 class="wordmark" aria-label="SoftSutra">
          <span class="wordmark__soft">Soft</span><span class="wordmark__sutra">Sutra</span>
        </h1>
        <p class="tagline">Weaving ideas into <span>Seamless Apps</span>.</p>
      </section>

      <section class="app-list" id="app-list" aria-label="SoftSutra apps" data-reveal></section>

      <p class="sr-only" id="download-status" aria-live="polite"></p>
      <iframe class="download-frame" id="download-frame" title="Background download" aria-hidden="true" tabindex="-1"></iframe>
    </div>
  </main>

  <script src="assets/js/app.js" defer></script>
</body>
</html>
