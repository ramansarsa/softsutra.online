<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | SoftSutra</title>
  <meta name="description" content="The requested SoftSutra page could not be found.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#F9FAFB">
  <meta name="color-scheme" content="light">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; media-src 'self'; worker-src 'none'; upgrade-insecure-requests; block-all-mixed-content">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="page-404">
  <div class="page-ambient" aria-hidden="true">
    <div class="page-ambient__beam page-ambient__beam--blue"></div>
    <div class="page-ambient__beam page-ambient__beam--orange"></div>
    <div class="page-ambient__mesh"></div>
  </div>

  <main class="not-found">
    <div class="shell">
      <article class="not-found__card surface-card" data-reveal>
        <p class="section-intro__eyebrow">404 Error</p>
        <h1 class="not-found__title">This page is not available.</h1>
        <p class="not-found__copy">
          The link you opened does not exist right now. Return to the SoftSutra homepage to browse the app list and direct downloads.
        </p>
        <div class="hero__actions">
          <a class="button button--primary" href="./">Return Home</a>
          <a class="button button--secondary" href="./#apps">Browse Apps</a>
        </div>
      </article>
    </div>
  </main>

  <script src="assets/js/app.js" defer></script>
</body>
</html>
